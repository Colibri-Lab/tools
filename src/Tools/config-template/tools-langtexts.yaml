tools-menu-settings-data-desc:
  hy: Կայքի կարգավորումները < br />Այստեղ կարող եք խմբագրել որոշ կարգավորումներ,
    որոնք նախապես ստեղծվել են մենեջերի կողմից կարգավորումների մենեջերում
  ru: Настройки сайта<br />Здесь можно отредактировать некоторые настройки,
    предварительно созданные менеджером в менеджере настроек
  en: Site Settings<br />Here you can edit some settings previously created by the
    manager in the settings manager
  it: Impostazioni del sito<br />Qui puoi modificare alcune impostazioni
    precedentemente create dal manager nel gestore delle impostazioni
  es: Ajustes del sitio<br />Aquí puedes editar algunas configuraciones creadas
    previamente por el administrador en el administrador de configuraciones
  kk: Сайт параметрлері<br />Мұнда сіз параметрлер менеджерінде менеджер бұрын
    жасаған кейбір параметрлерді өңдей аласыз
  uz: Sayt sozlamalari<br />Bu yerda siz sozlamalar menejerida menejer tomonidan oldindan yaratılmış bazı ayarları düzenleyebilirsiniz
  de: Seiteneinstellungen<br />Hier können Sie einige Einstellungen bearbeiten, die zuvor vom Manager im Einstellungsmanager erstellt wurden
  fa: تنظیمات سایت<br />در اینجا می توانید برخی از تنظیمات را که قبلاً توسط مدیر در مدیر تنظیمات ایجاد شده است ویرایش کنید
  cz: Nastavení stránek<br />Zde můžete upravit některá nastavení, která dříve vytvořil správce v nastavení správce
  tr: Site ayarları<br />Burada, yönetici tarafından ayarlar yöneticisinde önceden oluşturulmuş bazı ayarları düzenleyebilirsiniz
  zh: 网站设置<br />在这里，您可以编辑一些之前由管理员在设置管理器中创建的设置
tools-menu-filesondisk:
  hy: Ֆայլեր սկավառակի վրա
  ru: Файлы на диске
  en: Files on disk
  it: File sul disco
  es: Archivos en el disco
  kk: Дискідегі файлдар
  uz: Diskdagi fayllar
  de: Dateien auf der Festplatte
  fa: دیسک上的文件
  cz: Soubory na disku
  tr: Diskteki dosyalar
  zh: 磁盘上的文件
tools-menu-filesondisk-desc:
  hy: "Ֆայլերը գտնվում են ընթացիկ սերվերի վրա, տեղական մեքենայի վրա: Դուք կարող եք
    ավելացնել կամ ջնջել անցանկալի ֆայլեր. Ուշադրություն! Երբ դուք հեռացնել
    ֆայլերը, դուք պետք է հաշվի առնել, որ որոշ տողերի պահեստներում կարող է հղում
    նրանց"
  ru: Файлы находящиеся на текущем сервере, на локальной машине. Можно добавить
    или удалить ненужные файлы. Внимание! При удалении файлов, нужно учесть, что
    некоторые строки в хранилищах могут ссылаться на них
  en: Files located on the current server, on the local machine. You can add or
    delete unnecessary files. Attention! When deleting files, you need to take
    into account that some lines in the repositories may refer to them
  it: File situati sul server corrente, sulla macchina locale. Puoi aggiungere o
    eliminare file non necessari. Attenzione! Quando si eliminano i file, è
    necessario tenere conto che alcune righe nei repository possono fare
    riferimento ad essi
  es: Archivos ubicados en el servidor actual, en la máquina local. Puede agregar
    o eliminar archivos innecesarios. ¡Atención! Al eliminar archivos, es
    necesario tener en cuenta que algunas líneas en los repositorios pueden
    hacer referencia a ellos
  kk: Ағымдағы сервердегі, жергілікті машинадағы файлдар. Қажетсіз файлдарды
    қосуға немесе жоюға болады. Назар аударыңыз! Файлдарды жойған кезде,
    репозиторийлердегі кейбір жолдар оларға сілтеме жасай алатынын ескеру қажет
  uz: Joriy serverda, mahalliy mashinada joylashgan fayllar. Keraksiz fayllarni
    qo'shishingiz yoki o'chirishingiz mumkin. Diqqat! Fayllarni o'chirishda,
    ba'zi satrlar omborlarda ularga murojaat qilishi mumkinligini hisobga olish
    kerak
  de: Dateien auf dem aktuellen Server, auf der lokalen Maschine. Sie können
    unnötige Dateien hinzufügen oder löschen. Achtung! Beim Löschen von Dateien
    müssen Sie berücksichtigen, dass einige Zeilen in den Repositories auf sie
    verweisen können
  fa: فایل های واقع در سرور فعلی، روی ماشین محلی. شما می توانید فایل های غیر ضروری را اضافه یا حذف کنید. توجه! هنگام حذف فایل ها، باید در نظر داشته باشید که برخی خطوط در مخازن ممکن است به آنها اشاره کنند
  cz: Soubory umístěné na aktuálním serveru, na místním počítači. Můžete přidat nebo
    odstranit nepotřebné soubory. Pozor! Při odstraňování souborů je třeba vzít v
    úvahu, že některé řádky v repozitářích se na ně mohou odkazovat
  tr: Mevcut sunucuda, yerel makinedeki dosyalar. Gereksiz dosyaları ekleyebilir veya silebilirsiniz. Dikkat! Dosyaları silerken, bazı satırların depolarda onlara referans verebileceğini göz önünde bulundurmanız gerekir
  zh: 位于当前服务器上的文件，在本地机器上。您可以添加或删除不必要的文件。注意！删除文件时，您需要考虑到存储库中的某些行可能会引用它们
