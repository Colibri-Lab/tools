    variables are allowed
  hy: "Մուտքագրեք նամակի մարմինը: Թույլատրվում է տեղադրել տեսակի [[name]] որպես
    Կաղապար փոփոխականների"
  it: Inserisci il corpo della lettera. Sono ammessi inserimenti del tipo [[name]]
    come variabili di modello
  es: Ingrese el cuerpo del correo. Se permiten inserciones del tipo [[name]] como
    variables de plantilla
  kk: Хаттың денесін енгізіңіз. [[name]] түріндегі кірістірулер үлгі айнымалылары
    ретінде рұқсат етіледі
  uz: Xatning tanasini kiriting. [[name]] shaklidagi kiritmalar shablon
    o'zgaruvchilari sifatida ruxsat etiladi
  de: Geben Sie den Körper der E-Mail ein. Einfügungen der Form [[name]] als
    Template-Variablen sind erlaubt
  fa: متن ایمیل را وارد کنید. درج‌هایی به شکل [[name]] به عنوان متغیرهای قالب مجاز هستند
  cz: Zadejte tělo e-mailu. Vkládání ve formátu [[name]] jako proměnné šablony jsou
    povoleny
  tr: E-posta gövdesini girin. [[name]] biçimindeki eklemeler şablon değişkenleri
    olarak izin verilir
  zh: 输入电子邮件正文。允许以[[name]]形式的插入作为模板变量
