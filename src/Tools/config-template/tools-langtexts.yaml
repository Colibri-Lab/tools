tools-execute-create-info:
  ru: >-
    Внимание! Скрипт исполняется в окружении всего проекта, возможны необратимые
    последствия, пожалуйста, будьте осторожны. 

    Для вывода информации используйте Logger $logger, например: $logger->debug('Тестовое сообщение');
  en: >-
    Attention! The script is executed in the environment of the entire project,
    irreversible consequences are possible, please be careful 

    Use Logger $logger for sending information to client, for example: $logger->debug('Test message');
  hy: >-
    Ուշադրություն! Script կատարվում շրջապատված է ամբողջ ծրագրի, հնարավոր
    անդառնալի հետեւանքներ, խնդրում ենք զգույշ լինել: 

    Օգտագօրծեք Logger $logger էկրանին ինֆօրմացյա ցույց տալու համար, օրինակ: $logger->debug('Տեստաին նամակ');
  it: >-
    Attenzione! Lo script viene eseguito nell'ambiente dell'intero progetto,
    sono possibili conseguenze irreversibili, si prega di fare attenzione 

    Utilizzare Logger $logger per inviare informazioni al client, ad esempio: $logger->debug('Messaggio di prova');
  es: >-
    ¡Atención! El script se ejecuta en el entorno de todo el proyecto, son
    posibles consecuencias irreversibles, por favor tenga cuidado 

    Utilice Logger $logger para enviar información al cliente, por ejemplo: $logger->debug('Mensaje de prueba');
  kk: >-
    Назар аударыңыз! Скрипт бүкіл жоба ортасында орындалады, қайтымсыз салдарлар
    болуы мүмкін, абай болыңыз 

    Ақпаратты клиентке жіберу үшін Logger $logger пайдаланыңыз, мысалы: $logger->debug('Тесттік хабарлама');
  uz: >-
    Diqqat! Skript butun loyiha muhiti doirasida bajariladi, qaytarib
    bo'lmaydigan oqibatlar bo'lishi mumkin, iltimos ehtiyot bo'ling 

    Ma'lumotni mijozga yuborish uchun Logger $logger dan foydalaning, masalan: $logger->debug('Sinov xabari');
  de: >-
    Achtung! Das Skript wird in der Umgebung des gesamten Projekts ausgeführt, irreversible Folgen sind möglich, bitte seien Sie vorsichtig

    Verwenden Sie Logger $logger, um Informationen an den Client zu senden, zum Beispiel: $logger->debug('Testnachricht');
  fa: >-
    توجه! اسکریپت در محیط کل پروژه اجرا می شود، ممکن است پیامدهای غیرقابل برگشت وجود داشته باشد، لطفا مراقب باشید 
    برای ارسال اطلاعات به مشتری از Logger $logger استفاده کنید، به عنوان مثال: $logger->debug('پیام آزمایشی');
  cz: >-
    Pozor! Skript se spouští v prostředí celého projektu, jsou možné nevratné následky, buďte opatrní
    Pro odesílání informací klientovi použijte Logger $logger, například: $logger->debug('Testovací zpráva');
  tr: >-
    Dikkat! Skript tüm projenin ortamında çalıştırılır, geri dönüşü olmayan sonuçlar olabilir, lütfen dikkatli olun
