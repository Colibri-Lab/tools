tools-themes-deletethememessage:
  ru: Вы уверены, что хотите удалить тему? На сайтах привязанных к этой теме могут
    возникнуть артефакты
  en: Are you sure you want to delete the theme? Artifacts may occur on sites
    linked to this topic
  hy: "Համոզված եք, որ ցանկանում եք ջնջել թեման: Այս թեմային առնչվող կայքերում
    կարող են առաջանալ արտեֆակտներ"
  it: Sei sicuro di voler eliminare il tema? Possono verificarsi artefatti sui
    siti collegati a questo tema
  es: ¿Está seguro de que desea eliminar el tema? Pueden ocurrir artefactos en los
    sitios vinculados a este tema
  kk: Тақырыпты жойғыңыз келетініне сенімдісіз бе? Осы тақырыпқа байланысты
    сайттарда артефактілер пайда болуы мүмкін
  uz: Mavzuni o'chirishni xohlaysizmi? Ushbu mavzuga bog'langan saytlarda
    artefaktlar paydo bo'lishi mumkin
  de: Sind Sie sicher, dass Sie das Thema löschen möchten? Auf mit diesem Thema verknüpften Websites können Artefakte auftreten
  fa: آیا مطمئن هستید که می خواهید موضوع را حذف کنید؟ ممکن است در سایت های مرتبط با این موضوع آثار ظاهر شود
  cz: Jste si jisti, že chcete odstranit téma? Na webech propojených s tímto tématem se mohou objevit artefakty
  tr: Konuyu silmek istediğinizden emin misiniz? Bu konuya bağlı sitelerde yapıtlar oluşabilir
  zh: 您确定要删除主题吗？与此主题关联的网站上可能会出现伪影
