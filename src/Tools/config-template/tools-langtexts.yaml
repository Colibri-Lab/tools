  kk: Қашықтағы файл кітапханасы. Қажет болса, шелек қосуға және/немесе босатуға
    болады
  uz: Uzoq fayl kutubxonasi. Agar kerak bo'lsa, chelaklarni qo'shishingiz va/yoki
    bo'shatishingiz mumkin
  de: Remote-Dateibibliothek. Sie können Buckets hinzufügen und/oder leeren, wenn
    dies erforderlich ist
  fa: کتابخانه فایل از راه دور. شما می توانید سطل ها را اضافه کنید و/یا در صورت لزوم آنها را خالی کنید
  cz: Vzdálená knihovna souborů. Můžete přidat kbelíky a/ne
    bo je vyprázdnit, pokud je to nutné
  tr: Uzak dosya kütüphanesi. Gerekirse kovalar ekleyebilir ve/veya boşaltabilirsiniz
  zh: 远程文件库。您可以根据需要添加桶和/或清空它们
